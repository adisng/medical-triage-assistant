server {
    listen 8080 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ───────────────────────────────────────────────────────
    add_header X-Content-Type-Options     "nosniff"           always;
    add_header X-Frame-Options            "SAMEORIGIN"        always;
    add_header X-XSS-Protection           "1; mode=block"     always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(self), camera=(), microphone=(self)" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
    add_header X-Robots-Tag               "noindex, nofollow" always;

    # ─── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/html;
    gzip_min_length 256;

    # ─── Service Worker — must NOT be cached aggressively ───────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        # Required MIME type for SW
        default_type application/javascript;
    }

    # ─── Manifest ───────────────────────────────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "public, max-age=86400";
        default_type application/manifest+json;
    }

    # ─── Cache static assets (versioned via query string) ───────────────────────
    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /offline.html;
}
