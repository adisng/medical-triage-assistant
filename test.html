<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Suite — Medical Triage Assistant</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0b0f1a; color: #e8ecf4;
      margin: 0; padding: 2rem;
      line-height: 1.6;
    }
    h1 { font-size: 20px; margin-bottom: 0.25rem; color: #a78bfa; }
    p.sub { color: #636e82; font-size: 13px; margin-bottom: 1.5rem; }

    #test-results { display: flex; flex-direction: column; gap: 6px; }

    .test-summary {
      padding: 12px 16px; border-radius: 8px;
      font-weight: 700; font-size: 15px; margin-bottom: 8px;
    }
    .all-pass { background: rgba(52,211,153,0.12); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }
    .has-fail  { background: rgba(239,68,68,0.12);  color: #f87171;  border: 1px solid rgba(239,68,68,0.2); }

    .test-row {
      padding: 7px 14px; border-radius: 6px;
      font-size: 13px; font-family: 'Menlo', 'Courier New', monospace;
    }
    .test-row.pass { background: rgba(52,211,153,0.07); color: #6ee7b7; }
    .test-row.fail { background: rgba(239,68,68,0.1); color: #fca5a5; border-left: 3px solid #ef4444; }

    .loading { color: #636e82; font-style: italic; }
  </style>
</head>
<body>
  <h1>🧪 Test Suite</h1>
  <p class="sub">Medical Triage Assistant — Unit Tests</p>

  <div id="test-results">
    <p class="loading">Loading tests…</p>
  </div>

  <!--
    Load app dependencies first so all functions (parseTriageResponse,
    escapeAttr, sanitizeText, validateInput, isRateLimited, state, etc.)
    are available before tests.js runs.
  -->
  <script src="config.js"></script>
  <script src="app.js"></script>
  <script src="tests.js"></script>
</body>
</html>
